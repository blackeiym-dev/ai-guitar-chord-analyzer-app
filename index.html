<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AI Guitar Chord Analyzer</title>
<script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
<style>
:root{
 --bg:#edf6ff;--panel:#fff;--ink:#102840;--muted:#617990;--border:#bfd3e5;
 --blue:#0d6fbd;--blue2:#36a2f4;--yellow:#fff1a8;--yellow2:#ffc928;
 --red:#c83d3d;--shadow:0 8px 24px rgba(31,84,128,.11)
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#fbfdff,var(--bg));color:var(--ink);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",Meiryo,sans-serif}
.app{max-width:1180px;margin:auto;padding:16px 14px 48px}
header{padding:4px 0 14px}.eyebrow{font-size:12px;letter-spacing:.18em;color:var(--blue);font-weight:800}
h1{font-size:clamp(28px,5vw,50px);margin:8px 0;line-height:1.12}h1 span{color:var(--blue)}
.sub{color:var(--muted);line-height:1.7;margin:0}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:17px;margin-bottom:15px}
.panel-title{font-size:12px;letter-spacing:.12em;color:var(--muted);font-weight:900;margin-bottom:12px}
.controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin-bottom:6px}
input,select,button{font:inherit}
input[type=text],input[type=number],select{width:100%;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--ink);padding:10px 11px;font-weight:700}
input[type=file]{width:100%}
.btn{border:1px solid var(--border);background:#f8fbff;color:var(--ink);border-radius:10px;padding:10px 14px;font-weight:850;cursor:pointer;min-height:44px}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.row{display:flex;gap:8px;flex-wrap:wrap}
.player-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}
.time{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:clamp(28px,5vw,46px);font-weight:900;color:var(--blue)}
.transport{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}
.progress{width:100%;accent-color:var(--blue)}
.big-status{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.status-card{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fbfdff}
.status-card small{display:block;color:var(--muted);font-weight:800;margin-bottom:5px}
.status-card strong{font-size:clamp(24px,5vw,42px)}
.chart-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.chart-window{overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;border:1px solid var(--border);border-radius:13px;padding:10px;background:#f7fbff}
.chart{display:grid;grid-template-columns:repeat(4,minmax(145px,1fr));gap:9px;min-width:650px}
.bar{min-height:102px;border:2px solid #c8d8e6;border-radius:11px;background:#fff;padding:8px;cursor:pointer}
.bar.current{background:var(--yellow);border-color:var(--yellow2);box-shadow:0 0 0 3px rgba(255,201,40,.2),0 0 18px rgba(255,201,40,.55)}
.bar-number{font-size:11px;color:var(--muted);font-weight:800}
.bar input{font-size:24px;text-align:center;border:none;background:transparent;padding:5px;width:100%}
.bar input:focus{outline:2px solid var(--blue2);background:#fff;border-radius:7px}
.conf{font-size:11px;color:var(--muted);text-align:center}
.badge{display:inline-block;padding:5px 8px;border-radius:999px;background:#e9f5ff;color:var(--blue);font-size:12px;font-weight:800}
.help{font-size:12px;color:var(--muted);line-height:1.7}
.analysis-status{font-weight:800;color:var(--blue)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #c8d8e6;border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.library{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin-top:12px}
.song-item{border:1px solid var(--border);border-radius:12px;padding:11px;background:#fbfdff;display:flex;justify-content:space-between;gap:10px;align-items:center}
.song-item b{display:block}.song-meta{font-size:12px;color:var(--muted);margin-top:3px}
.print-only{display:none}.footer{text-align:center;color:var(--muted);font-size:12px;padding-top:8px}
@media(max-width:850px){.controls{grid-template-columns:repeat(2,1fr)}.player-grid{grid-template-columns:1fr}}
@media(max-width:640px){
 .app{padding:10px 9px 34px}.panel{padding:13px;border-radius:13px}
 .controls{grid-template-columns:1fr}.transport{grid-template-columns:repeat(3,1fr)}
 .library{grid-template-columns:1fr}.big-status{grid-template-columns:1fr 1fr}
 .chart{grid-template-columns:repeat(4,minmax(120px,1fr));min-width:540px}
}
@media print{
 @page{size:A4 landscape;margin:4mm}
 body{background:#fff!important}
 .app{max-width:none!important;width:289mm!important;padding:0!important;margin:0!important}
 header,.panel,.footer{display:none!important}
 .print-only{display:block!important;width:289mm;height:202mm;overflow:hidden}
 .print-title{font-size:13pt;font-weight:900;margin-bottom:1mm}
 .print-meta{font-size:7pt;color:#617990;margin-bottom:1.5mm}
 .print-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:1mm;transform-origin:top left}
 .print-bar{border:.3mm solid #9fb8cc;border-radius:1.2mm;height:22mm;padding:1mm;overflow:hidden}
 .print-bar-number{font-size:5pt;color:#617990;font-weight:800}
 .print-bar-code{font-size:11pt;font-weight:900;text-align:center;margin-top:3.7mm;white-space:nowrap}
 .print-bar-conf{font-size:4.4pt;color:#617990;text-align:center;margin-top:1.7mm}
}
</style>
<!-- AI Guitar Chord Analyzer -->
</head>
<body>
<div class="app">
<header>
 <div class="eyebrow">まっつんのAIギターラボ</div>
 <h1><span>AI Guitar Chord Analyzer</span></h1>
</header>

<div class="panel">
 <div class="panel-title">AUDIO / 音源</div>
 <div class="player-grid">
  <div>
   <div class="field"><label>音源ファイル</label>
    <input id="audioFile" type="file" accept=".mp3,.wav,.m4a,.aac,.mp4,.caf,audio/mpeg,audio/wav,audio/mp4,audio/aac">
   </div>
   <p class="help">iPhone・iPadでは「ファイル」アプリ内の音源を選択してください。iCloudの雲マーク付きファイルは先に端末へダウンロードしてください。</p>
   <input id="seek" class="progress" type="range" min="0" max="100" value="0" step="0.01">
   <div class="transport">
    <button class="btn" id="back5">−5秒</button><button class="btn" id="back01">−0.1秒</button>
    <button class="btn primary" id="playPause" disabled>再生</button>
    <button class="btn" id="fwd01">＋0.1秒</button><button class="btn" id="fwd5">＋5秒</button>
   </div>
  </div>
  <div>
   <div class="time" id="timeDisplay">00:00.00</div>
   <div class="controls" style="grid-template-columns:1fr 1fr;margin-top:10px">
    <div class="field"><label>速度</label><select id="speed"><option value="0.5">0.50倍</option><option value="0.75">0.75倍</option><option value="1" selected>1.00倍</option><option value="1.25">1.25倍</option><option value="1.5">1.50倍</option></select></div>
    <div class="field"><label>キー変更</label><select id="pitch"><option value="-6">−6</option><option value="-5">−5</option><option value="-4">−4</option><option value="-3">−3</option><option value="-2">−2</option><option value="-1">−1</option><option value="0" selected>0</option><option value="1">＋1</option><option value="2">＋2</option><option value="3">＋3</option><option value="4">＋4</option><option value="5">＋5</option><option value="6">＋6</option></select></div>
   </div>
   <div class="row" style="margin-top:10px">
    <button class="btn primary" id="analyzeBtn" disabled>コード解析を開始</button>
    <button class="btn active" id="followToggle">自動追従ON</button>
   </div>
   <p id="analysisStatus" class="analysis-status">音源を選択してください。</p>
  </div>
 </div>
 <audio id="audio" preload="metadata" playsinline></audio>
</div>

<div class="panel">
 <div class="panel-title">ANALYSIS RESULT / 解析結果</div>
 <div class="controls">
  <div class="field"><label>曲名</label><input id="songTitle" type="text"></div>
  <div class="field"><label>推定原曲キー</label><input id="originalKey" type="text" readonly></div>
  <div class="field"><label>移調後キー</label><input id="transposedKey" type="text" readonly></div>
  <div class="field"><label>推定BPM</label><input id="bpm" type="number" min="30" max="240" step="0.1" value="90"></div>
 </div>
 <div class="controls" style="margin-top:10px">
  <div class="field"><label>拍子</label><select id="meter"><option value="4">4/4</option><option value="3">3/4</option><option value="6">6/8</option></select></div>
  <div class="field"><label>1小節目開始（秒）</label><input id="barStart" type="number" step="0.01" value="0"></div>
  <div class="field"><label>総小節数</label><input id="barCount" type="number" min="12" max="400" value="12"></div>
  <div class="field"><label>コード表示</label><select id="chordDisplay"><option value="transposed">移調後コード</option><option value="original">原曲コード</option></select></div>
 </div>
 <div class="controls" style="margin-top:10px">
  <div class="field"><label>表示タイミング補正（秒）</label><input id="displayOffset" type="number" min="-3" max="3" step="0.05" value="0"></div>
  <div class="field"><label>微調整</label><div class="row"><button class="btn" id="offsetMinus">−0.05秒</button><button class="btn" id="offsetPlus">＋0.05秒</button></div></div>
 </div>
</div>

<div class="panel">
 <div class="panel-title">NOW PLAYING / 現在位置</div>
 <div class="big-status">
  <div class="status-card"><small>現在の小節・コード</small><strong id="currentCode">1｜—</strong></div>
  <div class="status-card"><small>次のコード</small><strong id="nextCode">—</strong></div>
 </div>
</div>

<div class="panel">
 <div class="panel-title">CHORD CHART / 12小節箱譜</div>
 <div class="chart-toolbar">
  <button class="btn" id="prevWindow">前の12小節</button><button class="btn" id="nextWindow">次の12小節</button>
  <button class="btn" id="jumpCurrent">現在位置へ</button><span class="badge" id="rangeBadge">1〜12小節</span>
 </div>
 <div class="chart-window"><div id="chart" class="chart"></div></div>
</div>

<div class="panel">
 <div class="panel-title">SAVE / 複数曲保存</div>
 <div class="controls">
  <div class="field"><label>保存名</label><input id="saveName" type="text"></div>
  <div class="field"><label>保存曲数</label><input id="savedCount" type="text" readonly value="0曲"></div>
 </div>
 <div class="row" style="margin-top:10px">
  <button class="btn primary" id="saveSong">保存／更新</button>
  <button class="btn" id="printPdf">A4印刷／PDF</button>
 </div>
 <div id="songLibrary" class="library"></div>
</div>

<div id="printArea" class="print-only">
 <div id="printTitle" class="print-title"></div>
 <div id="printMeta" class="print-meta"></div>
 <div id="printGrid" class="print-grid"></div>
</div>
<div class="footer">AI Guitar Chord Analyzer</div>
</div>

<script>
const $=id=>document.getElementById(id);
const audio=$('audio');
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const MAJOR=[6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
const MINOR=[6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];
const TEMPLATES=[
 {s:'',t:[0,4,7]},{s:'m',t:[0,3,7]},{s:'7',t:[0,4,7,10]},
 {s:'m7',t:[0,3,7,10]},{s:'maj7',t:[0,4,7,11]},{s:'sus4',t:[0,5,7]}
];
const state={
 objectUrl:null,
 audioBuffer:null,
 audioCtx:null,
 mediaSource:null,
 dryGain:null,
 pitchNode:null,
 pitchReady:false,
 follow:true,
 currentBar:1,
 windowStart:1,
 originalKey:'',
 chords:[],
 confidence:[],
 fileName:'',
 fileToken:0,
 analysisToken:0,
 isAnalyzing:false
};

function fmt(sec){const m=Math.floor(sec/60),s=sec-m*60;return String(m).padStart(2,'0')+':'+s.toFixed(2).padStart(5,'0')}
function transposeRoot(root,n){const i=NOTES.indexOf(root);return i<0?root:NOTES[(i+n+120)%12]}
function transposeChord(ch,n){if(!ch||ch==='—')return ch;return ch.split('/').map(x=>{const m=x.trim().match(/^([A-G](?:#|b)?)(.*)$/);if(!m)return x;let r=m[1].replace('Db','C#').replace('Eb','D#').replace('Gb','F#').replace('Ab','G#').replace('Bb','A#');return transposeRoot(r,n)+m[2]}).join(' / ')}
function displayedChord(i){const c=state.chords[i]||'—';return $('chordDisplay').value==='original'?c:transposeChord(c,+$('pitch').value||0)}
function secondsPerBar(){return (60/Math.max(1,+$('bpm').value||90))*(+$('meter').value||4)}
function calcBar(t){const x=(t+(+$('displayOffset').value||0))-(+$('barStart').value||0);return Math.min(Math.max(1,state.chords.length||1),Math.max(1,Math.floor(Math.max(0,x)/secondsPerBar())+1))}
function barTime(n){return (+$('barStart').value||0)+(n-1)*secondsPerBar()}
function updateKeys(){const k=state.originalKey;$('originalKey').value=k||'';if(!k){$('transposedKey').value='';return}const m=k.match(/^([A-G]#?)(.*)$/);$('transposedKey').value=m?transposeRoot(m[1],+$('pitch').value||0)+m[2]:k}

function cancelAnalysis(){
 state.analysisToken++;
 state.isAnalyzing=false;
 $('analyzeBtn').disabled=state.audioBuffer===null;
}

function resetForNewFile(){
 cancelAnalysis();
 audio.pause();
 audio.currentTime=0;
 audio.removeAttribute('src');
 audio.load();

 $('playPause').textContent='再生';
 $('playPause').disabled=true;
 $('analyzeBtn').disabled=true;
 $('seek').value=0;
 $('seek').max=100;
 $('timeDisplay').textContent='00:00.00';

 state.audioBuffer=null;
 state.currentBar=1;
 state.windowStart=1;
 state.originalKey='';
 state.chords=Array(12).fill('—');
 state.confidence=Array(12).fill(0);
 state.fileName='';

 $('songTitle').value='';
 $('saveName').value='';
 $('originalKey').value='';
 $('transposedKey').value='';
 $('bpm').value=90;
 $('barCount').value=12;
 $('barStart').value=0;
 $('displayOffset').value=0;
 $('pitch').value=0;
 $('speed').value=1;
 audio.playbackRate=1;

 if(state.pitchReady){
   try{
     state.dryGain.gain.setValueAtTime(1,state.audioCtx.currentTime);
     state.pitchNode.wet.value=0;
     state.pitchNode.pitch=0;
   }catch(_){}
 }

 $('analysisStatus').textContent='新しい音源を選択してください。';
 renderChart();
 updateNow();
}

async function ensureAudioGraph(){
 if(state.pitchReady) return true;
 if(!window.Tone) return false;

 try{
   await Tone.start();
   const raw=Tone.getContext().rawContext;
   state.audioCtx=raw;
   state.mediaSource=raw.createMediaElementSource(audio);

   state.dryGain=raw.createGain();
   state.dryGain.gain.value=1;
   state.mediaSource.connect(state.dryGain);
   state.dryGain.connect(raw.destination);

   state.pitchNode=new Tone.PitchShift({
     pitch:0,
     windowSize:0.08,
     delayTime:0
   }).toDestination();
   state.pitchNode.wet.value=1;
   state.mediaSource.connect(state.pitchNode.input);

   state.pitchReady=true;
   return true;
 }catch(e){
   console.warn('Pitch graph unavailable:',e);
   return false;
 }
}

async function setPitchMode(){
 const pitch=+$('pitch').value||0;
 const ok=await ensureAudioGraph();

 if(ok){
   try{
     if(pitch===0){
       state.dryGain.gain.setTargetAtTime(1,state.audioCtx.currentTime,0.01);
       state.pitchNode.wet.value=0;
       state.pitchNode.pitch=0;
     }else{
       state.dryGain.gain.setTargetAtTime(0,state.audioCtx.currentTime,0.01);
       state.pitchNode.wet.value=1;
       state.pitchNode.pitch=pitch;
     }
   }catch(e){
     console.warn(e);
   }
 }else if(pitch!==0){
   $('pitch').value=0;
   $('analysisStatus').textContent='この端末ではキー変更を初期化できません。再生とコード解析は利用できます。';
 }
 updateKeys();
 renderChart();
 updateNow();
}
function followCurrent(){
 if(!state.follow)return;
 const next=Math.floor((state.currentBar-1)/12)*12+1;
 if(state.windowStart!==next)state.windowStart=next;
}
function updateNow(){
 $('currentCode').textContent=`${state.currentBar}｜${displayedChord(state.currentBar-1)}`;
 $('nextCode').textContent=displayedChord(state.currentBar)||'—';
}
function renderChart(){
 const total=Math.max(12,+$('barCount').value||12);
 while(state.chords.length<total){state.chords.push('—');state.confidence.push(0)}
 if(state.chords.length>total){state.chords=state.chords.slice(0,total);state.confidence=state.confidence.slice(0,total)}
 const end=Math.min(total,state.windowStart+11);$('rangeBadge').textContent=`${state.windowStart}〜${end}小節`;
 const chart=$('chart');chart.innerHTML='';
 for(let b=state.windowStart;b<=end;b++){
  const box=document.createElement('div');box.className='bar'+(b===state.currentBar?' current':'');
  const n=document.createElement('div');n.className='bar-number';n.textContent=`${b}小節`;
  const inp=document.createElement('input');inp.value=displayedChord(b-1);inp.onclick=e=>e.stopPropagation();
  inp.onchange=()=>{let v=inp.value.trim()||'—';state.chords[b-1]=$('chordDisplay').value==='original'?v:transposeChord(v,-(+$('pitch').value||0));renderChart();updateNow()};
  const cf=document.createElement('div');cf.className='conf';cf.textContent=state.confidence[b-1]?`信頼度 ${Math.round(state.confidence[b-1]*100)}%`:'';
  box.append(n,inp,cf);box.onclick=()=>{audio.currentTime=Math.max(0,barTime(b));syncFromAudio(true)};chart.appendChild(box);
 }
}
function syncFromAudio(force=false){
 const t=Number.isFinite(audio.currentTime)?audio.currentTime:0;
 $('seek').max=Number.isFinite(audio.duration)?audio.duration:100;
 $('seek').value=t;$('timeDisplay').textContent=fmt(t);
 const b=calcBar(t);
 if(force||b!==state.currentBar){state.currentBar=b;followCurrent();renderChart();updateNow()}
}
function animationLoop(){syncFromAudio(false);requestAnimationFrame(animationLoop)}
requestAnimationFrame(animationLoop);

$('audioFile').onchange=async e=>{
 const f=e.target.files&&e.target.files[0];
 if(!f) return;

 resetForNewFile();
 const myFileToken=++state.fileToken;
 state.fileName=f.name;
 $('songTitle').value=f.name.replace(/\.[^.]+$/,'');
 $('saveName').value=$('songTitle').value;
 $('analysisStatus').innerHTML='<span class="spinner"></span>音源を読み込んでいます…';

 if(state.objectUrl) URL.revokeObjectURL(state.objectUrl);
 state.objectUrl=URL.createObjectURL(f);
 audio.src=state.objectUrl;
 audio.load();

 try{
   const arr=await f.arrayBuffer();
   if(myFileToken!==state.fileToken) return;

   const AC=window.AudioContext||window.webkitAudioContext;
   if(!AC) throw new Error('AudioContext is unavailable');
   const decodeCtx=new AC();

   state.audioBuffer=await decodeCtx.decodeAudioData(arr.slice(0));
   if(myFileToken!==state.fileToken) return;

   $('seek').max=state.audioBuffer.duration;
   $('playPause').disabled=false;
   $('analyzeBtn').disabled=false;
   $('analysisStatus').textContent=`読み込み完了：${f.name}（${fmt(state.audioBuffer.duration)}）`;

   // iOS/Safariではユーザー操作前にAudioContextを作らず、再生ボタンで初期化する。
 }catch(err){
   console.error(err);
   if(myFileToken!==state.fileToken) return;
   state.audioBuffer=null;
   $('playPause').disabled=true;
   $('analyzeBtn').disabled=true;
   $('analysisStatus').textContent='音源を読み込めませんでした。MP3またはWAVで再度お試しください。';
 }
};
$('playPause').onclick=async()=>{
 if(!audio.src) return;
 try{
   if(audio.paused){
     if((+$('pitch').value||0)!==0) await setPitchMode();
     await audio.play();
   }else{
     audio.pause();
   }
 }catch(e){
   console.error(e);
   $('analysisStatus').textContent='再生を開始できませんでした。音源を選び直して、もう一度再生してください。';
 }
};
audio.onplay=()=>$('playPause').textContent='停止';
audio.onpause=()=>$('playPause').textContent='再生';
audio.onended=()=>{audio.currentTime=0;syncFromAudio(true)};
$('seek').oninput=()=>{audio.currentTime=+$('seek').value;syncFromAudio(true)};
$('back5').onclick=()=>{audio.currentTime=Math.max(0,audio.currentTime-5);syncFromAudio(true)};
$('fwd5').onclick=()=>{audio.currentTime=Math.min(audio.duration||0,audio.currentTime+5);syncFromAudio(true)};
$('back01').onclick=()=>{audio.currentTime=Math.max(0,audio.currentTime-.1);syncFromAudio(true)};
$('fwd01').onclick=()=>{audio.currentTime=Math.min(audio.duration||0,audio.currentTime+.1);syncFromAudio(true)};
$('speed').onchange=()=>{audio.playbackRate=+$('speed').value;audio.preservesPitch=true;audio.webkitPreservesPitch=true};
$('pitch').onchange=()=>setPitchMode();
$('followToggle').onclick=()=>{state.follow=!state.follow;$('followToggle').textContent=state.follow?'自動追従ON':'自動追従OFF';$('followToggle').classList.toggle('active',state.follow);if(state.follow){followCurrent();renderChart()}};
$('prevWindow').onclick=()=>{state.windowStart=Math.max(1,state.windowStart-12);renderChart()};
$('nextWindow').onclick=()=>{state.windowStart=Math.min(Math.max(1,state.chords.length-11),state.windowStart+12);renderChart()};
$('jumpCurrent').onclick=()=>{state.windowStart=Math.floor((state.currentBar-1)/12)*12+1;renderChart()};
$('offsetMinus').onclick=()=>{$('displayOffset').value=(Math.max(-3,(+$('displayOffset').value||0)-.05)).toFixed(2);syncFromAudio(true)};
$('offsetPlus').onclick=()=>{$('displayOffset').value=(Math.min(3,(+$('displayOffset').value||0)+.05)).toFixed(2);syncFromAudio(true)};
['bpm','meter','barStart','barCount','displayOffset'].forEach(id=>$(id).onchange=()=>syncFromAudio(true));
$('chordDisplay').onchange=()=>{renderChart();updateNow()};

function hann(n,N){return .5-.5*Math.cos(2*Math.PI*n/(N-1))}
function goertzel(samples,sr,f){const w=2*Math.PI*f/sr,c=2*Math.cos(w);let s0=0,s1=0,s2=0;for(let i=0;i<samples.length;i++){s0=samples[i]+c*s1-s2;s2=s1;s1=s0}return s1*s1+s2*s2-c*s1*s2}
function chromaSegment(data,sr,start,end){
 const target=4096,step=Math.max(1,Math.floor(Math.max(1,end-start)/target)),buf=[];
 for(let i=start;i<end&&buf.length<target;i+=step)buf.push(data[i]);
 while(buf.length<target)buf.push(0);
 for(let i=0;i<buf.length;i++)buf[i]*=hann(i,buf.length);
 const c=Array(12).fill(0);
 for(let midi=36;midi<=88;midi++){const f=440*Math.pow(2,(midi-69)/12);c[midi%12]+=goertzel(buf,sr,f)}
 const sum=c.reduce((a,b)=>a+b,0)||1;return c.map(x=>x/sum)
}
function corr(a,b){const am=a.reduce((x,y)=>x+y,0)/a.length,bm=b.reduce((x,y)=>x+y,0)/b.length;let n=0,da=0,db=0;for(let i=0;i<a.length;i++){const x=a[i]-am,y=b[i]-bm;n+=x*y;da+=x*x;db+=y*y}return n/Math.sqrt((da||1)*(db||1))}
function rotate(a,n){return a.map((_,i)=>a[(i-n+120)%12])}
function estimateKey(global){let best={score:-9,name:''};for(let r=0;r<12;r++)for(const [p,s] of [[MAJOR,''],[MINOR,'m']]){const sc=corr(global,rotate(p,r));if(sc>best.score)best={score:sc,name:NOTES[r]+s}}return best}
function estimateChord(c,keyRoot){
 let list=[];
 for(let r=0;r<12;r++)for(const t of TEMPLATES){
  const inside=t.t.reduce((s,x)=>s+c[(r+x)%12],0);
  const outside=c.reduce((s,x,i)=>s+(t.t.includes((i-r+12)%12)?0:x),0);
  let score=inside-.30*outside;
  if(r===keyRoot)score+=.02;
  list.push({name:NOTES[r]+t.s,score})
 }
 list.sort((a,b)=>b.score-a.score);
 return {name:list[0].name,conf:Math.max(0,Math.min(1,.42+(list[0].score-list[1].score)*4.2))}
}
function estimateBpm(data,sr){
 const hop=Math.max(128,Math.floor(sr*.02)),env=[];
 for(let i=0;i<data.length;i+=hop){let s=0;for(let j=i;j<Math.min(data.length,i+hop);j++)s+=data[j]*data[j];env.push(Math.sqrt(s/Math.max(1,Math.min(hop,data.length-i))))}
 const d=env.map((x,i)=>Math.max(0,x-(env[i-1]||x)));
 let best={bpm:90,score:-1};
 for(let bpm=55;bpm<=180;bpm++){const lag=Math.round((60/bpm)/.02);let sc=0;for(let i=lag;i<d.length;i++)sc+=d[i]*d[i-lag];if(sc>best.score)best={bpm,score:sc}}
 let bpm=best.bpm;
 while(bpm>145)bpm/=2;
 while(bpm<60)bpm*=2;
 return Math.round(bpm*10)/10
}
function smoothChords(chords){
 const out=[...chords];
 for(let i=1;i<out.length-1;i++)if(out[i-1]===out[i+1]&&out[i]!==out[i-1])out[i]=out[i-1];
 return out
}

$('analyzeBtn').onclick=async()=>{
 if(!state.audioBuffer||state.isAnalyzing) return;

 const myAnalysisToken=++state.analysisToken;
 const myFileToken=state.fileToken;
 state.isAnalyzing=true;

 // 解析開始時に前回の結果を完全消去
 state.originalKey='';
 state.chords=Array(12).fill('—');
 state.confidence=Array(12).fill(0);
 state.currentBar=1;
 state.windowStart=1;
 $('originalKey').value='';
 $('transposedKey').value='';
 $('barCount').value=12;
 renderChart();
 updateNow();

 $('analysisStatus').innerHTML='<span class="spinner"></span>解析を開始しています…';
 $('analyzeBtn').disabled=true;
 await new Promise(r=>setTimeout(r,30));

 try{
   const sr=state.audioBuffer.sampleRate;
   let data;

   if(state.audioBuffer.numberOfChannels===1){
     data=state.audioBuffer.getChannelData(0);
   }else{
     const a=state.audioBuffer.getChannelData(0);
     const b=state.audioBuffer.getChannelData(1);
     data=new Float32Array(a.length);
     for(let i=0;i<a.length;i++) data[i]=(a[i]+b[i])*.5;
   }

   const max=Math.min(data.length,sr*600);
   data=data.subarray(0,max);

   if(myAnalysisToken!==state.analysisToken||myFileToken!==state.fileToken) return;

   const bpm=estimateBpm(data,sr);
   $('bpm').value=bpm;

   const spb=secondsPerBar();
   const count=Math.max(12,Math.ceil(state.audioBuffer.duration/spb));
   $('barCount').value=count;

   const chromas=[];
   const global=Array(12).fill(0);
   const startOffset=+$('barStart').value||0;

   for(let bar=0;bar<count;bar++){
     if(myAnalysisToken!==state.analysisToken||myFileToken!==state.fileToken) return;

     const barS=startOffset+bar*spb;
     const barE=startOffset+(bar+1)*spb;
     const sub=[];

     for(let q=0;q<4;q++){
       const s=Math.floor((barS+(barE-barS)*q/4)*sr);
       const e=Math.min(data.length,Math.floor((barS+(barE-barS)*(q+1)/4)*sr));
       if(s<data.length) sub.push(chromaSegment(data,sr,s,e));
     }

     const c=Array(12).fill(0);
     for(const x of sub){
       for(let i=0;i<12;i++) c[i]+=x[i]/Math.max(1,sub.length);
     }

     chromas.push(c);
     for(let i=0;i<12;i++) global[i]+=c[i];

     if(bar%4===0){
       $('analysisStatus').innerHTML=`<span class="spinner"></span>${bar+1}/${count}小節を解析中`;
       await new Promise(r=>setTimeout(r,0));
     }
   }

   if(myAnalysisToken!==state.analysisToken||myFileToken!==state.fileToken) return;

   const key=estimateKey(global);
   const kr=NOTES.indexOf(key.name.replace('m',''));
   const raw=[];
   const conf=[];

   for(const c of chromas){
     const x=estimateChord(c,kr);
     raw.push(x.name);
     conf.push(x.conf);
   }

   if(myAnalysisToken!==state.analysisToken||myFileToken!==state.fileToken) return;

   state.originalKey=key.name;
   state.chords=smoothChords(raw);
   state.confidence=conf;
   state.currentBar=calcBar(audio.currentTime);
   followCurrent();
   updateKeys();
   renderChart();
   updateNow();

   $('analysisStatus').textContent=`解析完了：キー ${state.originalKey}／BPM ${bpm}`;
 }catch(err){
   console.error(err);
   if(myAnalysisToken===state.analysisToken&&myFileToken===state.fileToken){
     $('analysisStatus').textContent='コード解析中にエラーが発生しました。音源を選び直して再度お試しください。';
   }
 }finally{
   if(myAnalysisToken===state.analysisToken&&myFileToken===state.fileToken){
     state.isAnalyzing=false;
     $('analyzeBtn').disabled=state.audioBuffer===null;
   }
 }
};

const STORE='ai-guitar-chord-analyzer-v1';
function lib(){try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){return {}}}
function saveLib(x){localStorage.setItem(STORE,JSON.stringify(x))}
function renderLibrary(){
 const l=lib(),arr=Object.values(l);$('savedCount').value=`${arr.length}曲`;$('songLibrary').innerHTML='';
 for(const d of arr){
  const item=document.createElement('div');item.className='song-item';
  const info=document.createElement('div');info.innerHTML=`<b>${d.name}</b><div class="song-meta">${d.key||'—'}／BPM ${d.bpm}／${d.chords.length}小節</div>`;
  const row=document.createElement('div');row.className='row';
  const open=document.createElement('button');open.className='btn';open.textContent='開く';
  open.onclick=()=>{state.originalKey=d.key||'';$('songTitle').value=d.title||d.name;$('saveName').value=d.name;$('bpm').value=d.bpm;$('meter').value=d.meter;$('barStart').value=d.barStart;$('displayOffset').value=d.offset||0;state.chords=[...d.chords];state.confidence=[...(d.confidence||[])];$('barCount').value=state.chords.length;state.currentBar=1;state.windowStart=1;updateKeys();renderChart();updateNow();$('analysisStatus').textContent='保存結果を読み込みました。音源は再選択してください。'};
  const del=document.createElement('button');del.className='btn danger';del.textContent='削除';del.onclick=()=>{const x=lib();delete x[d.name];saveLib(x);renderLibrary()};
  row.append(open,del);item.append(info,row);$('songLibrary').appendChild(item)
 }
}
$('saveSong').onclick=()=>{
 const name=($('saveName').value||$('songTitle').value).trim();if(!name)return alert('保存名を入力してください。');
 const x=lib();x[name]={name,title:$('songTitle').value,key:state.originalKey,bpm:+$('bpm').value,meter:+$('meter').value,barStart:+$('barStart').value,offset:+$('displayOffset').value,chords:[...state.chords],confidence:[...state.confidence]};
 saveLib(x);renderLibrary();alert('保存しました。')
};

function buildPrint(){
 const total=state.chords.length,rows=Math.ceil(total/8),scale=Math.min(1,7.4/rows);
 $('printTitle').textContent=$('songTitle').value||'コード箱譜';
 $('printMeta').textContent=`キー ${state.originalKey||'—'}　BPM ${$('bpm').value}　全${total}小節`;
 $('printGrid').style.transform=`scale(${scale})`;$('printGrid').style.width=`${100/scale}%`;$('printGrid').innerHTML='';
 for(let i=0;i<total;i++){const b=document.createElement('div');b.className='print-bar';b.innerHTML=`<div class="print-bar-number">${i+1}小節</div><div class="print-bar-code">${displayedChord(i)}</div><div class="print-bar-conf">${state.confidence[i]?`信頼度 ${Math.round(state.confidence[i]*100)}%`:''}</div>`;$('printGrid').appendChild(b)}
}
$('printPdf').onclick=()=>{buildPrint();setTimeout(()=>window.print(),50)};

state.chords=Array(12).fill('—');state.confidence=Array(12).fill(0);renderChart();updateNow();renderLibrary();
</script>
